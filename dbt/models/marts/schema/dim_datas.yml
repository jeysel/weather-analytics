version: 2

models:

  # ── dim_datas ──────────────────────────────────────────────────────────────
  - name: dim_datas
    description: >
      **Dimensão calendário** gerada pelo pacote dbt_date.
      Período: 2024-01-01 a 2030-12-31.
      Enriquecida com nomes em português e estações do Hemisfério Sul.
      Usada como dimensão de tempo no Looker Studio para joins com
      mart_climate__daily_facts e mart_climate__hourly_facts.
    tags: ["marts", "dimension", "calendar"]
    meta:
      layer: marts
      owner: analytics-engineering

    columns:
      - name: dt_data
        description: "Data — chave natural única da dimensão."
        tests:
          - not_null
          - unique

      - name: ano
        description: "Ano (ex: 2024)."
        tests: [not_null]

      - name: mes
        description: "Mês numérico (1–12)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 12

      - name: dia
        description: "Dia do mês (1–31)."
        tests: [not_null]

      - name: trimestre
        description: "Trimestre (1–4)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 1
              max_value: 4

      - name: dia_semana_num
        description: "Dia da semana numérico (0=Domingo, 6=Sábado)."
        tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 6

      - name: nm_mes
        description: "Nome do mês em português (ex: Janeiro)."
        tests:
          - not_null
          - accepted_values:
              values: [Janeiro, Fevereiro, Março, Abril, Maio, Junho,
                       Julho, Agosto, Setembro, Outubro, Novembro, Dezembro]

      - name: nm_mes_abrev
        description: "Nome abreviado do mês em português (ex: Jan)."
        tests: [not_null]

      - name: nm_dia_semana
        description: "Nome do dia da semana em português (ex: Segunda-feira)."
        tests:
          - not_null
          - accepted_values:
              values: [Domingo, Segunda-feira, Terça-feira, Quarta-feira,
                       Quinta-feira, Sexta-feira, Sábado]

      - name: estacao
        description: "Estação do ano no Hemisfério Sul (Verão, Outono, Inverno, Primavera)."
        tests:
          - not_null
          - accepted_values:
              values: [Verão, Outono, Inverno, Primavera]

      - name: ano_mes
        description: "Formato YYYY-MM para agrupamentos mensais (ex: 2024-07)."
        tests: [not_null]

      - name: nm_trimestre
        description: "Descrição do trimestre (ex: 1º Tri)."
        tests: [not_null]

      - name: sigla_trimestre
        description: "Sigla do trimestre (Q1, Q2, Q3, Q4)."
        tests:
          - not_null
          - accepted_values:
              values: [Q1, Q2, Q3, Q4]

      - name: fl_fim_de_semana
        description: "True se sábado ou domingo."
        tests: [not_null]

      - name: primeiro_dia_mes
        description: "Primeiro dia do mês corrente."
        tests: [not_null]

      - name: ultimo_dia_mes
        description: "Último dia do mês corrente."
        tests: [not_null]
