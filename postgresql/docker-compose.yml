name: weather-analytics

# ─────────────────────────────────────────────────────────────────────────────
# Weather Pipeline — PostgreSQL + dbt
#
# Serviços permanentes (sobem com `docker compose up`):
#   postgres  — banco de staging, inicializado automaticamente pelo entrypoint
#
# Serviços dbt (execute com `docker compose run --rm <serviço>`):
#   dbt-debug        — valida conexões e profiles
#   dbt-seed         — carrega seeds/locations.csv
#   dbt-run          — executa todos os modelos
#   dbt-run-staging  — só a camada staging
#   dbt-run-marts    — só os marts
#   dbt-test         — todos os testes
#   dbt-build        — run + test completo
#   dbt-docs         — gera e serve docs em http://localhost:8080
#   dbt-docs-generate — só gera, não serve
# ─────────────────────────────────────────────────────────────────────────────

# ── Bloco base reutilizado por todos os serviços dbt ──────────────────────────
x-dbt-base: &dbt-base
  build:
    context: ../dbt
    dockerfile: Dockerfile
  volumes:
    - ../dbt:/dbt                                          # projeto dbt (live reload)
    - ${DBT_PROFILES_DIR:-~/.dbt}:/root/.dbt:ro           # profiles.yml local
    - ./secrets/gcp-service-account.json:/secrets/gcp.json:ro  # credencial GCP
  environment:
    DBT_TARGET:              ${DBT_TARGET:-dev}
    GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp.json
    POSTGRES_HOST:           postgres
    POSTGRES_PORT:           ${POSTGRES_PORT:-5432}
    POSTGRES_DB:             ${POSTGRES_DB:-weather_staging}
    POSTGRES_USER:           ${WEATHER_DBT_USER:-dbt_user}
    POSTGRES_PASSWORD:       ${WEATHER_DBT_PASSWORD:-dbt_pass_troque}
    GCP_PROJECT_ID:          ${GCP_PROJECT_ID}
    DBT_SOURCE_DATABASE:     ${DBT_SOURCE_DATABASE:-weather_staging}
    DBT_SOURCE_SCHEMA:       ${DBT_SOURCE_SCHEMA:-raw}
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - weather_net
  profiles:
    - dbt

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PG_VERSION: "17"
    container_name: weather_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-weather_staging}
      POSTGRES_USER:     ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_pass}
      POSTGRES_PORT:     ${POSTGRES_PORT:-5432}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/17/main
      - pg_logs:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_staging}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - weather_net
  
  # ── dbt: instala pacotes (dbt_utils, dbt_expectations, audit_helper) ──────
  dbt-deps:
    <<: *dbt-base
    container_name: weather_dbt_deps
    command: deps

  # ── dbt: valida conexões e profiles ───────────────────────────────────────
  dbt-debug:
    <<: *dbt-base
    container_name: weather_dbt_debug
    command: debug

  # ── dbt: carrega seeds/locations.csv ──────────────────────────────────────
  dbt-seed:
    <<: *dbt-base
    container_name: weather_dbt_seed
    command: seed --show

  # ── dbt: executa todos os modelos ─────────────────────────────────────────
  dbt-run:
    <<: *dbt-base
    container_name: weather_dbt_run
    command: run --profiles-dir /root/.dbt

  # ── dbt: só a camada staging ──────────────────────────────────────────────
  dbt-run-staging:
    <<: *dbt-base
    container_name: weather_dbt_run_staging
    command: run --select staging

  # ── dbt: só os marts ──────────────────────────────────────────────────────
  dbt-run-marts:
    <<: *dbt-base
    container_name: weather_dbt_run_marts
    command: run --select marts

  # ── dbt: todos os testes ──────────────────────────────────────────────────
  dbt-test:
    <<: *dbt-base
    container_name: weather_dbt_test
    command: test

  # ── dbt: run + test completo ──────────────────────────────────────────────
  dbt-build:
    <<: *dbt-base
    container_name: weather_dbt_build
    command: build --profiles-dir /root/.dbt

  # ── dbt: gera e serve docs em http://localhost:8080 ───────────────────────
  dbt-docs:
    <<: *dbt-base
    container_name: weather_dbt_docs
    command: docs serve --port 8080 --host 0.0.0.0
    ports:
      - "8080:8080"

  # ── dbt: só gera docs, não serve ──────────────────────────────────────────
  dbt-docs-generate:
    <<: *dbt-base
    container_name: weather_dbt_docs_generate
    command: docs generate

volumes:
  pg_data:
    name: weather_pg_data
  pg_logs:
    name: weather_pg_logs

networks:
  weather_net:
    name: weather_network
    driver: bridge
