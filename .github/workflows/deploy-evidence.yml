name: Deploy Evidence to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "Weather-Analytics/evidence/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Weather-Analytics/evidence

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Weather-Analytics/evidence/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Load sources (BigQuery)
        env:
          EVIDENCE_SOURCE__weather_dw__authenticator: service-account
          EVIDENCE_SOURCE__weather_dw__project_id: ${{ secrets.EVIDENCE_SOURCE__weather_dw__project_id }}
          EVIDENCE_SOURCE__weather_dw__dataset: ${{ secrets.EVIDENCE_SOURCE__weather_dw__dataset }}
          EVIDENCE_SOURCE__weather_dw__location: ${{ secrets.EVIDENCE_SOURCE__weather_dw__location }}
          EVIDENCE_SOURCE__weather_dw__client_email: ${{ secrets.EVIDENCE_SOURCE__weather_dw__client_email }}
          EVIDENCE_SOURCE__weather_dw__private_key: ${{ secrets.EVIDENCE_SOURCE__weather_dw__private_key }}
          EVIDENCE_DISABLE_INCLUDE: "true"
        run: npm run sources

      - name: Build site
        env:
          EVIDENCE_SOURCE__weather_dw__authenticator: service-account
          EVIDENCE_SOURCE__weather_dw__project_id: ${{ secrets.EVIDENCE_SOURCE__weather_dw__project_id }}
          EVIDENCE_SOURCE__weather_dw__dataset: ${{ secrets.EVIDENCE_SOURCE__weather_dw__dataset }}
          EVIDENCE_SOURCE__weather_dw__location: ${{ secrets.EVIDENCE_SOURCE__weather_dw__location }}
          EVIDENCE_SOURCE__weather_dw__client_email: ${{ secrets.EVIDENCE_SOURCE__weather_dw__client_email }}
          EVIDENCE_SOURCE__weather_dw__private_key: ${{ secrets.EVIDENCE_SOURCE__weather_dw__private_key }}
          EVIDENCE_DISABLE_INCLUDE: "true"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Weather-Analytics/evidence/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
