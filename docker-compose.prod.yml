services:
  streamlit-weather:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: streamlit-weather
    ports:
      - "127.0.0.1:8501:8501"
    volumes:
      - /home/ubuntu/secrets:/app/secrets:ro
    env_file:
      - .env.prod
    networks:
      - jeysel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  jeysel-network:
    external: true
