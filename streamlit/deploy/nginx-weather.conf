# /etc/nginx/sites-available/weather.jeysel.dev
# Symlink: ln -s /etc/nginx/sites-available/weather.jeysel.dev /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name weather.jeysel.dev;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name weather.jeysel.dev;

    ssl_certificate     /etc/letsencrypt/live/weather.jeysel.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/weather.jeysel.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # WebSocket headers — obrigatórios para o Streamlit funcionar
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }
}
